<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <script src="script1.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card" style="width: 28rem; margin: 20px auto;">
        <div class="card-body">
            <h1>Calculadora</h1>

            <form id="numeroForm">
                <label for="numero">Digite um número:</label>
                <input type="number" id="numero" class="form-control mb-2" required>


                <label for="operacao">Escolha a operação:</label>
                <select id="operacao" class="form-control mb-2">
                    <option value="quadrado">Quadrado</option>
                    <option value="cubo">Cubo</option>
                    <option value="raiz">Raiz Quadrada</option>
                </select>

                <button type="submit" class="btn btn-success">Calcular</button>
            </form>

            <h5 class="mt-3">Resultados:</h5>
            <ul id="listaResultados"></ul>
        </div>
    </div>
</body>

</html>
